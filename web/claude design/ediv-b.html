<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ediV clinic — 안 B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jeju+Myeongjo&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brown:   #674748;
  --brown-d: #4a3132;
  --pink:    #fe2dde;
  --cream:   #f5f1e8;
  --white:   #ffffff;
  --ink:     #1a081a;
  --font-ko: 'Jeju Myeongjo', 'KoPubWorld Batang', serif;
  --font-en: 'Cormorant Garamond', Georgia, serif;
  --track:   0.075em;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-ko); color: var(--ink);
  background: var(--white); -webkit-font-smoothing: antialiased;
}

/* ── NAV ──────────────────────────────────────────────── */
.nav-b {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 32px 64px;
  transition: background 0.45s, padding 0.4s;
}
.nav-b.scrolled {
  padding: 18px 64px;
  background: rgba(103,71,72,0.97);
  backdrop-filter: blur(12px);
}
.nav-b .b-logo img {
  height: 26px; width: auto; display: block;
  filter: brightness(0) invert(1) opacity(0.9); transition: opacity 0.3s;
}
.nav-b ul { display: flex; gap: 40px; list-style: none; }
.nav-b ul a {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  text-decoration: none; color: rgba(255,255,255,0.6); transition: color 0.2s;
}
.nav-b ul a:hover { color: var(--cream); }
.nav-lang-b { display: flex; align-items: center; gap: 6px; }
.nav-lang-b button {
  background: none; border: none; font-family: var(--font-ko);
  font-size: 11px; letter-spacing: 0.1em; cursor: pointer;
  color: rgba(255,255,255,0.38); transition: color 0.2s; padding: 0;
}
.nav-lang-b button.on { color: rgba(255,255,255,0.9); }
.nav-lang-b .sep { color: rgba(255,255,255,0.18); font-size: 11px; }

.nav-b-symbol {
  margin-left: 28px; padding-left: 28px;
  border-left: 1px solid rgba(255,255,255,0.14);
  display: flex; align-items: center;
}
.nav-b-symbol img {
  height: 18px; width: auto; display: block;
  filter: brightness(0) invert(1) opacity(0.6);
  transition: opacity 0.3s;
}
.nav-b.scrolled .nav-b-symbol { border-left-color: rgba(255,255,255,0.14); }
.nav-b.scrolled .nav-b-symbol img { opacity: 0.75; }

/* ── HERO · full-screen video ─────────────────────────── */
.hero-b {
  position: relative; min-height: 100vh;
  overflow: hidden; background: var(--brown-d);
}
.hero-b video {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center top; z-index: 0;
}
.hero-b-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    108deg,
    rgba(74,49,50,0.93) 0%,
    rgba(103,71,72,0.78) 28%,
    rgba(103,71,72,0.32) 56%,
    transparent 74%
  );
}
.hero-b-copy {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 160px 64px 100px; min-height: 100vh; max-width: 54%;
}
.hero-b-eyebrow {
  font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(245,241,232,0.45); margin-bottom: 36px;
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.hero-b-eyebrow.in { opacity: 1; transform: none; }
.hero-b h1 {
  font-family: var(--font-ko); font-size: clamp(28px, 3vw, 52px);
  font-weight: 400; line-height: 1.45; letter-spacing: var(--track);
  color: var(--cream); margin-bottom: 44px;
}
.hero-b h1 .h1-line {
  display: block; opacity: 0; transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.hero-b h1 .h1-line.in { opacity: 1; transform: none; }
.hero-b-sub {
  font-size: 13px; line-height: 2.2; letter-spacing: var(--track);
  color: rgba(245,241,232,0.55); white-space: pre-line; max-width: 280px;
  opacity: 0; transform: translateY(16px);
  transition: opacity 0.8s ease 0.5s, transform 0.8s ease 0.5s;
}
.hero-b-sub.in { opacity: 1; transform: none; }
.hero-b-scroll {
  position: absolute; bottom: 44px; left: 64px; z-index: 2;
  display: flex; align-items: center; gap: 12px;
  opacity: 0; transition: opacity 0.8s ease 1.1s;
}
.hero-b-scroll.in { opacity: 1; }
.hero-b-scroll-line { width: 36px; height: 1px; background: rgba(245,241,232,0.3); }
.hero-b-scroll-label {
  font-size: 9px; letter-spacing: 0.26em; text-transform: uppercase;
  color: rgba(245,241,232,0.3);
}
.hero-b-label {
  position: absolute; bottom: 36px; right: 40px; z-index: 2;
  font-family: var(--font-en); font-size: 10px; letter-spacing: 0.14em;
  color: rgba(245,241,232,0.25); writing-mode: vertical-rl;
}

/* ── SPREAD · editorial floating images ───────────────── */
.spread-b {
  background: var(--cream);
  padding: 96px 64px 108px;
}
.spread-b-head {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 72px;
}
.spread-b-vol {
  font-family: var(--font-en); font-size: 10px; letter-spacing: 0.22em;
  color: rgba(103,71,72,0.38); text-transform: uppercase;
}
.spread-b-rule { flex: 1; height: 1px; background: rgba(103,71,72,0.12); }
.spread-b-date {
  font-size: 10px; letter-spacing: 0.18em; color: rgba(103,71,72,0.38);
}
.spread-b-body {
  display: grid; grid-template-columns: 54% 46%;
  align-items: flex-start;
}
.spread-b-left img {
  width: 88%; display: block;
  aspect-ratio: 4/3; object-fit: cover;
}
.spread-b-right {
  padding-top: 18%;
  display: flex; flex-direction: column; align-items: flex-end;
}
.spread-b-right img {
  width: 68%; display: block;
  aspect-ratio: 3/4; object-fit: cover;
}
.spread-b-caption {
  margin-top: 36px; padding-right: 6%;
  text-align: right;
}
.spread-b-caption p {
  font-size: 11px; line-height: 2; letter-spacing: var(--track);
  color: rgba(103,71,72,0.55); white-space: pre-line;
}
.spread-b-caption span {
  display: block; font-family: var(--font-en); font-size: 9px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(103,71,72,0.3); margin-top: 12px;
}

/* ── CARE PANEL · 석간주 full-width ──────────────────── */
.panel-b {
  display: grid; grid-template-columns: 44% 56%;
  background: var(--brown); min-height: 82vh;
}
.panel-b-text {
  padding: 80px 64px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.panel-b-label {
  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(245,241,232,0.32);
}
.panel-b-main { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 52px; }
.panel-b-headline {
  font-family: var(--font-ko); font-size: clamp(26px, 2.8vw, 46px);
  font-weight: 400; line-height: 1.6; letter-spacing: var(--track);
  color: var(--cream); white-space: pre-line; margin-bottom: 32px;
}
.panel-b-body {
  font-size: 12px; line-height: 2.2; letter-spacing: var(--track);
  color: rgba(245,241,232,0.42); max-width: 240px; margin-bottom: 40px;
  white-space: pre-line;
}
.panel-b-cta {
  display: inline-flex; align-items: center; gap: 14px;
  border: 1px solid rgba(245,241,232,0.28); color: var(--cream);
  background: none; padding: 14px 28px; width: fit-content;
  font-family: var(--font-ko); font-size: 11px; letter-spacing: 0.15em;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
}
.panel-b-cta:hover { border-color: rgba(245,241,232,0.7); background: rgba(245,241,232,0.08); }
.panel-b-img { position: relative; overflow: hidden; }
.panel-b-img img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform 1s ease;
}
.panel-b:hover .panel-b-img img { transform: scale(1.03); }

/* ── MANIFESTO · deep 석간주 ─────────────────────────── */
.manifesto-b {
  background: var(--brown-d); padding: 140px 64px;
  position: relative; overflow: hidden;
}
.manifesto-b::after {
  content: '기억';
  position: absolute; right: -0.05em; bottom: -0.2em;
  font-family: var(--font-ko); font-size: 340px; line-height: 1;
  color: rgba(255,255,255,0.025); pointer-events: none; user-select: none;
}
.manifesto-b-kw {
  display: flex; align-items: center; gap: 14px;
  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(245,241,232,0.22); margin-bottom: 56px;
}
.manifesto-b-kw::before {
  content: ''; display: block; width: 20px; height: 1px; background: currentColor;
}
.manifesto-b-text {
  font-family: var(--font-ko); font-size: clamp(30px, 4.2vw, 66px);
  font-weight: 400; line-height: 1.6; letter-spacing: var(--track);
  color: var(--cream); white-space: pre-line; max-width: 860px;
}
.manifesto-b-text em {
  font-style: italic; font-family: var(--font-en);
  color: rgba(245,241,232,0.38);
}

/* ── FEATURE · 2-col editorial ────────────────────────── */
.feature-b {
  background: var(--white); padding: 120px 64px;
}
.feature-b-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  border-bottom: 1px solid rgba(103,71,72,0.1);
  padding-bottom: 22px; margin-bottom: 64px;
}
.feature-b-kw {
  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--brown);
}
.feature-b-count { font-family: var(--font-en); font-size: 11px; letter-spacing: 0.14em; color: rgba(103,71,72,0.35); }
/* big left / stack right */
.feature-b-grid {
  display: grid; grid-template-columns: 52% 48%; gap: 40px; align-items: start;
}
.feature-b-main { position: relative; }
.feature-b-main-img {
  width: 100%; aspect-ratio: 2/3; overflow: hidden; background: #e2dbd2; display: block;
}
.feature-b-main-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.8s ease; }
.feature-b-main:hover .feature-b-main-img img { transform: scale(1.04); }
.feature-b-main-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent 30%, rgba(26,8,26,0.65));
  padding: 60px 36px 36px;
}
.feature-b-main-num { font-size: 9px; letter-spacing: 0.22em; color: rgba(245,241,232,0.5); margin-bottom: 10px; }
.feature-b-main-title {
  font-family: var(--font-ko); font-size: clamp(16px, 1.6vw, 22px);
  font-weight: 400; line-height: 1.6; letter-spacing: var(--track);
  color: var(--cream); white-space: pre-line;
}
/* right stack */
.feature-b-stack { display: flex; flex-direction: column; gap: 40px; padding-top: 56px; }
.feature-b-sub { display: flex; flex-direction: column; gap: 24px; }
.feature-b-sub-img {
  width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #e8e0d5;
}
.feature-b-sub-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.8s ease; }
.feature-b-sub:hover .feature-b-sub-img img { transform: scale(1.04); }
.feature-b-sub-meta {
  display: flex; align-items: center; gap: 10px;
}
.feature-b-sub-num { font-size: 9px; letter-spacing: 0.2em; color: rgba(103,71,72,0.5); }
.feature-b-sub-tag {
  font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--pink); border: 1px solid rgba(254,45,222,0.22); padding: 2px 7px;
}
.feature-b-sub-title {
  font-family: var(--font-ko); font-size: 14px; font-weight: 400;
  line-height: 1.7; letter-spacing: var(--track); color: var(--ink);
  white-space: pre-line;
}
.feature-b-sub-body { font-size: 12px; line-height: 2; letter-spacing: var(--track); color: rgba(103,71,72,0.6); white-space: pre-line; }

/* quote within feature-b-stack */
.feature-b-quote {
  border-top: 1px solid rgba(103,71,72,0.12);
  padding-top: 32px;
}
.feature-b-quote p {
  font-family: var(--font-en); font-style: italic;
  font-size: clamp(18px, 1.8vw, 26px); line-height: 1.6; letter-spacing: 0.01em;
  color: var(--brown);
}

/* ── TAGLINE BAND ─────────────────────────────────────── */
.tagline-b { background: var(--brown); padding: 140px 64px; }
.tagline-b-inner { max-width: 1100px; margin: 0 auto; }
.tagline-b-kw {
  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(245,241,232,0.28); margin-bottom: 48px;
}
.tagline-b-text {
  font-family: var(--font-ko); font-size: clamp(30px, 4.4vw, 68px);
  font-weight: 400; line-height: 1.5; letter-spacing: var(--track);
  color: var(--cream); white-space: pre-line; margin-bottom: 36px;
}
.tagline-b-text em { font-style: italic; font-family: var(--font-en); color: rgba(245,241,232,0.38); }
.tagline-b-sub { font-size: 13px; line-height: 2; letter-spacing: var(--track); color: rgba(245,241,232,0.36); }

/* ── PROCEDURES ───────────────────────────────────────── */
.treat-b { padding: 120px 64px; background: var(--white); }
.treat-b-inner { max-width: 1100px; margin: 0 auto; }
.treat-b-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  border-bottom: 1px solid rgba(103,71,72,0.1); padding-bottom: 22px; margin-bottom: 0;
}
.treat-b-kw { font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--brown); }
.treat-b-note { font-size: 11px; letter-spacing: var(--track); color: rgba(103,71,72,0.35); }
.treat-b-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 0; border-bottom: 1px solid rgba(103,71,72,0.08);
  transition: padding 0.2s;
}
.treat-b-item:hover { padding-left: 8px; }
.treat-b-name {
  font-family: var(--font-ko); font-size: 15px; font-weight: 400;
  letter-spacing: var(--track); color: var(--ink); transition: color 0.2s;
}
.treat-b-item:hover .treat-b-name { color: var(--brown); }
.treat-b-tag { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--pink); opacity: 0.65; }

/* ── VISIT ────────────────────────────────────────────── */
.visit-b { background: var(--cream); padding: 140px 64px; }
.visit-b-inner {
  max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center;
}
.visit-b h2 {
  font-family: var(--font-ko); font-size: clamp(26px, 3.2vw, 48px);
  font-weight: 400; line-height: 1.5; letter-spacing: var(--track);
  color: var(--ink); white-space: pre-line; margin-bottom: 36px;
}
.visit-b-addr {
  font-size: 13px; line-height: 2.4; letter-spacing: var(--track);
  color: rgba(103,71,72,0.65); white-space: pre-line; margin-bottom: 44px;
}
.visit-b-cta {
  display: inline-flex; align-items: center; gap: 14px;
  background: var(--brown); color: var(--cream); border: none; padding: 16px 36px;
  font-family: var(--font-ko); font-size: 12px; letter-spacing: 0.15em;
  cursor: pointer; transition: background 0.25s;
}
.visit-b-cta:hover { background: var(--brown-d); }
.visit-b-map {
  aspect-ratio: 1; background: rgba(103,71,72,0.04);
  border: 1px solid rgba(103,71,72,0.14); position: relative; overflow: hidden;
}
.map-b-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(103,71,72,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(103,71,72,0.07) 1px, transparent 1px);
  background-size: 44px 44px;
}
.map-b-pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); text-align: center; }
.map-b-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--brown);
  margin: 0 auto 10px; box-shadow: 0 0 0 8px rgba(103,71,72,0.14);
}
.map-b-label { font-size: 10px; letter-spacing: 0.16em; color: var(--brown); white-space: nowrap; }

/* ── FOOTER ───────────────────────────────────────────── */
.foot-b { background: var(--ink); padding: 80px 64px 40px; }
.foot-b-inner {
  display: grid; grid-template-columns: 2.2fr 1fr 1fr 1fr; gap: 64px;
  padding-bottom: 64px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 32px;
}
.foot-b-brand-logo img {
  height: 18px; width: auto; display: block;
  filter: brightness(0) invert(1); opacity: 0.7; margin-bottom: 24px;
}
.foot-b-desc {
  font-size: 12px; line-height: 2.1; letter-spacing: var(--track);
  color: rgba(255,255,255,0.3); white-space: pre-line; margin-bottom: 28px;
}
.foot-b-social { display: flex; gap: 18px; }
.foot-b-social a { color: rgba(255,255,255,0.2); text-decoration: none; transition: color 0.2s; }
.foot-b-social a:hover { color: rgba(245,241,232,0.7); }
.foot-b-col h4 {
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.2); margin-bottom: 24px;
}
.foot-b-col ul { list-style: none; }
.foot-b-col li { margin-bottom: 12px; }
.foot-b-col a { font-size: 12px; letter-spacing: var(--track); color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; }
.foot-b-col a:hover { color: var(--cream); }
.foot-b-bottom {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; letter-spacing: var(--track); color: rgba(255,255,255,0.15);
}

/* ── REVEAL ───────────────────────────────────────────── */
.rv { opacity: 0; transform: translateY(28px); transition: opacity 0.85s ease, transform 0.85s ease; }
.rv.in { opacity: 1; transform: none; }

/* ── RESPONSIVE ───────────────────────────────────────── */
@media (max-width: 900px) {
  .nav-b, .nav-b.scrolled { padding: 20px 28px; }
  .nav-b ul { display: none; }
  .hero-b-copy { padding: 120px 28px 80px; max-width: 90%; }
  .hero-b-scroll { left: 28px; }
  .spread-b { padding: 72px 28px 80px; }
  .spread-b-body { grid-template-columns: 1fr; gap: 28px; }
  .spread-b-right { padding-top: 0; align-items: flex-start; }
  .spread-b-right img { width: 60%; }
  .panel-b { grid-template-columns: 1fr; }
  .panel-b-img { min-height: 55vw; }
  .panel-b-text { padding: 64px 28px; }
  .manifesto-b { padding: 80px 28px; }
  .feature-b { padding: 80px 28px 100px; }
  .feature-b-grid { grid-template-columns: 1fr; }
  .feature-b-stack { padding-top: 0; }
  .tagline-b { padding: 80px 28px; }
  .treat-b { padding: 80px 28px; }
  .visit-b { padding: 80px 28px; }
  .visit-b-inner { grid-template-columns: 1fr; gap: 48px; }
  .foot-b { padding: 60px 28px 32px; }
  .foot-b-inner { grid-template-columns: 1fr 1fr; gap: 40px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const COPY_B = {
  ko: {
    nav: [["홈","#hero"], ["소개","#spread"], ["진료안내","#feature"], ["예약","#visit"]],
    eyebrow: "에디브클리닉",
    h1: ["결을 읽고,", "인상을 설계합니다."],
    heroSub: "기록하는 곳, 기억하는 곳.\n에디브는 결과 인상을 읽고 기록합니다.\n기록이 쌓이면, 변화가 보입니다.",
    heroLabel: "Portrait — No. 014",
    scrollLabel: "Scroll",

    spreadVol: "Vol. 01",
    spreadDate: "2026",
    spreadCaption: "피부는 기억합니다.\n에디브는 그 기억을 기록으로 남깁니다.",
    spreadCaptionLabel: "ediV · Archive",

    panelLabel: "Care Gallery",
    panelHeadline: "높은 기준이\n좋은 결과를\n만듭니다.",
    panelBody: "경과가 살아나는 시간,\n나를 진심으로 이해하는\n무심한 손길.",
    panelCta: "진료 안내",

    manifestoKw: "Manifesto",

function Reveal({ children, delay = 0, className = "", style }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVis(true); obs.disconnect(); } },
      { threshold: 0.08 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={`rv ${vis ? "in" : ""} ${className}`}
         style={{ transitionDelay: `${delay * 120}ms`, ...style }}>
      {children}
    </div>
  );
}
