<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ediV clinic — preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Noto+Sans+KR:wght@300;400;500&display=swap">
<style>
@import url("https://cdn.jsdelivr.net/gh/spoqa/spoqa-han-sans@latest/css/SpoqaHanSansNeo.css");

/* ─────────────────────────────────────────────────────────────────────────
   ediV clinic · styles · v5
   덜어내고 채우다 — Less and fill.
   Palette: 지백색 (warm paper) + 석간주색 (red ochre)
───────────────────────────────────────────────────────────────────────── */

:root {
  --c-bg:           #EAE4D6;
  --c-bg-deeper:    #E1DACE;
  --c-bg-card:      #E5DFCF;
  --c-ink:          #1C1916;
  --c-ink-70:       rgba(28,25,22,.70);
  --c-ink-45:       rgba(28,25,22,.45);
  --c-ink-20:       rgba(28,25,22,.20);
  --c-ink-10:       rgba(28,25,22,.10);
  --c-accent:       #7A3122;
  --c-accent-mid:   rgba(122,49,34,.18);
  --c-accent-faint: rgba(122,49,34,.06);
  --w-body:    350;
  --w-heading: 300;
  --tracking:  -0.001em;
  --f-2xs: 0.625rem;
  --f-xs:  0.6875rem;
  --f-sm:  0.75rem;
  --f-base:0.875rem;
  --f-md:  1rem;
  --f-lg:  1.25rem;
  --f-xl:  1.75rem;
  --f-2xl: 2.5rem;
  --f-3xl: 3.5rem;
  --f-4xl: 5rem;
  --f-5xl: 7.5rem;
  --s1:  0.25rem; --s2:  0.5rem;  --s3:  0.75rem; --s4:  1rem;
  --s6:  1.5rem;  --s8:  2rem;    --s12: 3rem;     --s16: 4rem;
  --s24: 6rem;    --s32: 8rem;    --s48: 12rem;
  --ease-silk: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-fine: cubic-bezier(0.65, 0, 0.35, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--c-bg);
  color: var(--c-ink);
}

body {
  font-family: 'Spoqa Han Sans Neo', 'Noto Sans KR', sans-serif;
  font-weight: var(--w-body);
  letter-spacing: var(--tracking);
  background: var(--c-bg);
  overflow-x: hidden;
}

a  { color: inherit; text-decoration: none; }
ul { list-style: none; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
img { display: block; max-width: 100%; }

/* ── GRADIENT STAGE ────────────────────────────────────────────────── */
.gradient-stage {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; isolation: isolate;
}
.g-wash {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 180% 100% at -10% -5%, rgba(215,198,168,.80) 0%, rgba(215,198,168,.35) 35%, transparent 62%),
    radial-gradient(ellipse 120% 80% at 110% 110%, rgba(205,190,162,.45) 0%, transparent 55%),
    radial-gradient(ellipse 70% 60% at 50% 30%, rgba(230,220,198,.25) 0%, transparent 60%);
  will-change: opacity;
}
.g-fill {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 160% 120% at 115% 115%, rgba(210,193,160,.72) 0%, rgba(210,193,160,.28) 42%, transparent 65%),
    radial-gradient(ellipse 80% 70% at 20% 80%, rgba(200,182,152,.38) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 55% 55%, rgba(222,212,190,.22) 0%, transparent 60%);
  will-change: opacity;
}
.g-accent {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 90% 60% at 95% 100%, rgba(122,49,34,.16) 0%, rgba(122,49,34,.06) 40%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 5% 90%, rgba(140,62,42,.09) 0%, transparent 55%);
  mix-blend-mode: multiply; will-change: opacity;
}
.g-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(28,25,22,.10) 100%);
  will-change: opacity;
}
.gradient-empty-mark {
  position: absolute; bottom: var(--s8); right: var(--s8);
  display: flex; align-items: center; gap: .6em;
  opacity: 0; transform: translateY(6px); pointer-events: none;
  transition: opacity .8s var(--ease-silk), transform .8s var(--ease-silk);
}
.gradient-empty-mark.is-visible { transform: none; }
.em-ko { font-family: 'Noto Sans KR', sans-serif; font-size: var(--f-xs); font-weight: 300; letter-spacing: .08em; color: var(--c-ink-45); }
.em-sep { font-size: var(--f-xs); color: var(--c-ink-20); }
.em-en  { font-family: 'Spoqa Han Sans Neo', sans-serif; font-size: var(--f-2xs); font-weight: 400; letter-spacing: .26em; text-transform: uppercase; color: var(--c-ink-45); }

/* ── SCROLL PROGRESS ── */
.scroll-progress {
  position: fixed; top: 0; left: 0; height: 1px;
  background: var(--c-accent); opacity: .55; z-index: 1000;
  transition: width .12s linear;
}

/* ── NAV ── */
.nav {
  position: fixed; inset: 0 0 auto; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--s4) var(--s8);
  background: var(--c-bg);
  border-bottom: 1px solid var(--c-ink-10);
  transition: background .6s var(--ease-silk), border-color .6s var(--ease-silk), padding .4s var(--ease-silk), backdrop-filter .6s;
}
.nav.is-scrolled {
  background: rgba(234,228,214,.08);
  backdrop-filter: blur(12px) saturate(1.2);
  -webkit-backdrop-filter: blur(12px) saturate(1.2);
  border-bottom-color: transparent;
  padding: var(--s3) var(--s8);
}
.brand { display: flex; align-items: center; }
.nav-links {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; gap: var(--s8);
}
.nav-links a {
  position: relative; font-size: var(--f-xs); font-weight: 400;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--c-ink-70); transition: color .25s; padding-bottom: 2px;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  height: 1px; width: 0; background: var(--c-ink);
  transition: width .35s var(--ease-silk);
}
.nav-links a:hover { color: var(--c-ink); }
.nav-links a:hover::after { width: 100%; }
.nav-utility { display: flex; align-items: center; }
.lang-toggle {
  display: flex; border: 1px solid var(--c-ink-20);
  border-radius: 2px; overflow: hidden; transition: border-color .3s;
}
.lang-toggle button {
  font-size: var(--f-xs); font-weight: 400; letter-spacing: .1em;
  padding: 3px var(--s3); color: var(--c-ink-45);
  transition: background .25s, color .25s;
}
.lang-toggle button.on { background: var(--c-ink); color: var(--c-bg); }

/* ── STAGE ── */
.stage { position: relative; z-index: 1; }

/* ── HERO ── */
.hero {
  min-height: 100svh; display: grid;
  grid-template-columns: 1fr 1fr; align-items: center;
  padding: clamp(7rem, 12vw, 10rem) var(--s8) var(--s32);
  gap: var(--s12); position: relative; overflow: hidden;
}
.hero-copy {
  display: flex; flex-direction: column; gap: var(--s8);
  max-width: 600px; will-change: transform;
}
.hero-copy h1 {
  font-family: 'Cormorant Garamond', serif; font-weight: var(--w-heading);
  font-size: clamp(var(--f-3xl), 8vw, var(--f-5xl));
  line-height: .88; letter-spacing: -0.03em; color: var(--c-ink);
}
:lang(ko) .hero-copy h1 {
  font-family: 'Noto Sans KR', sans-serif; font-weight: 300;
  font-size: clamp(var(--f-2xl), 6.5vw, var(--f-4xl));
  line-height: 1.02; letter-spacing: -0.045em;
}
.hero-copy h1 .serif { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; }
.hero-sub { font-size: var(--f-sm); color: var(--c-ink-70); line-height: 2; letter-spacing: .01em; max-width: 320px; }
.hero-meta {
  display: flex; flex-direction: column; gap: var(--s2);
  padding-top: var(--s4); border-top: 1px solid var(--c-ink-20); max-width: 320px;
}
.hero-meta-item { display: flex; gap: var(--s6); align-items: baseline; }
.hero-meta-item .mk { font-size: var(--f-2xs); letter-spacing: .18em; text-transform: uppercase; color: var(--c-ink-45); font-weight: 400; min-width: 72px; flex-shrink: 0; }
.hero-meta-item .mv { font-size: var(--f-xs); color: var(--c-ink-70); letter-spacing: .04em; }
.hero-portrait {
  display: flex; flex-direction: column; align-items: flex-end;
  gap: var(--s3); will-change: transform;
}
.portrait-frame {
  width: 100%; max-width: 460px; aspect-ratio: 3 / 4.2;
  overflow: hidden; background: var(--c-bg-card);
  border-radius: 1px; position: relative;
}
.hero-portrait-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 7s var(--ease-fine); transform-origin: center 30%; }
.hero-portrait:hover .hero-portrait-img { transform: scale(1.04); }
.portrait-frame-inner {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, rgba(200,185,162,.6) 0%, rgba(180,165,140,.9) 100%);
  display: flex; align-items: center; justify-content: center;
}
.portrait-label { font-size: var(--f-xs); letter-spacing: .16em; text-transform: uppercase; color: var(--c-ink-45); align-self: flex-start; }
.scroll-hint {
  position: absolute; bottom: var(--s8); left: var(--s8);
  display: flex; flex-direction: column; align-items: center;
  gap: var(--s3); font-size: var(--f-2xs); letter-spacing: .20em;
  text-transform: uppercase; color: var(--c-ink-45);
}
.scroll-hint .bar {
  width: 1px; height: 44px; background: currentColor;
  transform-origin: top; animation: scrollBar 2.2s var(--ease-fine) infinite;
}
@keyframes scrollBar {
  0%   { transform: scaleY(1);  opacity: .45; }
  60%  { transform: scaleY(.2); opacity: .15; }
  100% { transform: scaleY(1);  opacity: .45; }
}
.word {
  display: inline-block; opacity: 0;
  transform: translateY(36px) skewY(1.5deg);
  transition: opacity 1.1s var(--ease-silk), transform 1.1s var(--ease-silk);
  transform-origin: left bottom;
}
.word.in { opacity: 1; transform: none; }

/* ── PHILOSOPHY ── */
.philosophy { padding: var(--s48) var(--s8); min-height: 50vh; display: flex; align-items: center; }
.philosophy-inner { max-width: 940px; display: flex; flex-direction: column; gap: var(--s6); }
.phil-k { font-size: var(--f-xs); letter-spacing: .22em; text-transform: uppercase; color: var(--c-ink-45); }
.phil-body {
  font-family: 'Cormorant Garamond', serif; font-weight: var(--w-heading);
  font-size: clamp(var(--f-xl), 3.6vw, var(--f-3xl));
  line-height: 1.35; letter-spacing: -.01em; color: var(--c-ink);
}
:lang(ko) .phil-body {
  font-family: 'Noto Sans KR', sans-serif; font-weight: 300;
  font-size: clamp(var(--f-lg), 2.6vw, var(--f-2xl));
  line-height: 1.7; letter-spacing: -.025em;
}
.phil-body em { font-style: italic; color: var(--c-accent); }

/* ── EDITORIAL CARDS ── */
.editorial { padding: var(--s32) var(--s8); }
.editorial-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s6); align-items: start; }
.editorial-grid .card:nth-child(1) { padding-top: 0; }
.editorial-grid .card:nth-child(2) { padding-top: var(--s16); }
.editorial-grid .card:nth-child(3) { padding-top: var(--s8); }
.card { display: flex; flex-direction: column; gap: var(--s4); transition: transform .5s var(--ease-silk); }
.card:hover { transform: translateY(-4px); }
.card-media { width: 100%; aspect-ratio: 3 / 4; overflow: hidden; background: var(--c-bg-card); border-radius: 1px; position: relative; }
.card-media .inner { position: absolute; inset: 0; transition: transform 1s var(--ease-silk); }
.card:hover .card-media .inner { transform: scale(1.045); }
.card-title { position: relative; display: inline; font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: clamp(var(--f-md), 1.7vw, var(--f-xl)); line-height: 1.22; letter-spacing: -.01em; color: var(--c-ink); }
.card-title::after { content: ''; display: block; height: 1px; width: 0; background: var(--c-accent); margin-top: var(--s1); transition: width .4s var(--ease-silk); }
.card:hover .card-title::after { width: 100%; }
:lang(ko) .card-title { font-family: 'Noto Sans KR', sans-serif; font-weight: 300; font-size: var(--f-base); line-height: 1.65; letter-spacing: -.02em; }
.card-num { font-size: var(--f-xs); letter-spacing: .18em; color: var(--c-ink-45); margin-top: var(--s4); }
.card-body { font-size: var(--f-sm); color: var(--c-ink-70); line-height: 1.9; letter-spacing: .01em; }

/* ── TAGLINE ── */
.tagline-band { padding: var(--s48) var(--s8); border-top: 1px solid var(--c-ink-10); border-bottom: 1px solid var(--c-ink-10); margin-block: var(--s16); }
.tagline-inner { max-width: 880px; display: flex; flex-direction: column; gap: var(--s4); }
.tagline-eyebrow { font-size: var(--f-xs); letter-spacing: .24em; text-transform: uppercase; color: var(--c-accent); }
.tagline { font-family: 'Cormorant Garamond', serif; font-weight: var(--w-heading); font-size: clamp(var(--f-2xl), 5vw, var(--f-4xl)); line-height: 1.12; letter-spacing: -.025em; color: var(--c-ink); }
:lang(ko) .tagline { font-family: 'Noto Sans KR', sans-serif; font-weight: 300; font-size: clamp(var(--f-xl), 3.6vw, var(--f-3xl)); line-height: 1.4; letter-spacing: -.035em; }
.tagline em { font-style: italic; color: var(--c-accent); }

/* ── VISIT ── */
.visit { padding: var(--s32) var(--s8); }
.visit-inner { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s24); align-items: center; }
.visit-inner h2 { font-family: 'Cormorant Garamond', serif; font-weight: var(--w-heading); font-size: clamp(var(--f-2xl), 4vw, var(--f-4xl)); line-height: 1.08; letter-spacing: -.025em; }
:lang(ko) .visit-inner h2 { font-family: 'Noto Sans KR', sans-serif; font-weight: 300; font-size: clamp(var(--f-xl), 3vw, var(--f-3xl)); line-height: 1.3; letter-spacing: -.04em; }
.visit-inner h2 em { font-style: italic; color: var(--c-accent); }
.visit-addr { margin-top: var(--s6); font-size: var(--f-sm); color: var(--c-ink-70); line-height: 2.1; letter-spacing: .02em; }
.visit-cta {
  display: inline-flex; align-items: center; gap: var(--s3); margin-top: var(--s8);
  font-size: var(--f-xs); letter-spacing: .16em; text-transform: uppercase; color: var(--c-ink);
  border-bottom: 1px solid var(--c-ink-45); padding-bottom: 3px;
  transition: color .2s, border-color .2s;
}
.visit-cta:hover { color: var(--c-accent); border-color: var(--c-accent); }
.visit-cta .arrow { transition: transform .3s var(--ease-silk); }
.visit-cta:hover .arrow { transform: translateX(4px); }
.visit-map { position: relative; aspect-ratio: 1 / .85; background: var(--c-bg-deeper); border: 1px solid var(--c-ink-10); border-radius: 1px; overflow: hidden; }
.grid-lines { position: absolute; inset: 0; background-image: linear-gradient(var(--c-ink-10) 1px, transparent 1px), linear-gradient(90deg, var(--c-ink-10) 1px, transparent 1px); background-size: 36px 36px; }
.pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); display: flex; flex-direction: column; align-items: center; gap: var(--s2); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c-accent); box-shadow: 0 0 0 7px var(--c-accent-mid); }
.pin .label { font-size: var(--f-xs); letter-spacing: .1em; color: var(--c-ink-70); white-space: nowrap; background: var(--c-bg); padding: 2px 7px; border-radius: 1px; margin-top: var(--s2); }

/* ── FOOTER ── */
.foot { padding: var(--s24) var(--s8) var(--s8); border-top: 1px solid var(--c-ink-10); margin-top: var(--s16); }
.foot-inner { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: var(--s8); padding-bottom: var(--s16); }
.foot-brand { display: flex; flex-direction: column; gap: var(--s4); }
.foot-brand p { font-size: var(--f-xs); color: var(--c-ink-70); line-height: 1.9; max-width: 230px; letter-spacing: .01em; }
.foot-social { display: flex; gap: var(--s4); margin-top: var(--s4); }
.foot-social a { color: var(--c-ink-45); transition: color .2s; }
.foot-social a:hover { color: var(--c-ink); }
.foot-col h4 { font-family: 'Spoqa Han Sans Neo', sans-serif; font-size: var(--f-2xs); font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--c-ink); margin-bottom: var(--s4); }
.foot-col ul { display: flex; flex-direction: column; gap: var(--s3); }
.foot-col li a { font-size: var(--f-xs); color: var(--c-ink-70); letter-spacing: .01em; transition: color .2s; }
.foot-col li a:hover { color: var(--c-ink); }
.foot-bottom { display: flex; align-items: center; justify-content: space-between; padding-top: var(--s6); border-top: 1px solid var(--c-ink-10); font-size: var(--f-xs); color: var(--c-ink-45); letter-spacing: .1em; }
.foot-bottom-left { display: flex; align-items: center; gap: var(--s3); }

/* ── REVEAL ── */
.reveal { opacity: 0; transform: translateY(28px); transition: opacity 1s var(--ease-silk), transform 1s var(--ease-silk); }
.reveal.in { opacity: 1; transform: none; }
.reveal.d1 { transition-delay: .15s; }
.reveal.d2 { transition-delay: .30s; }
.reveal.d3 { transition-delay: .48s; }
.editorial-grid .card.reveal              { transform: translateY(40px); }
.editorial-grid .card:nth-child(2).reveal { transform: translateY(52px); }
.editorial-grid .card:nth-child(3).reveal { transform: translateY(36px); }
.phil-body.reveal                         { transform: translateX(-12px) translateY(16px); }
.phil-body.reveal.in                      { transform: none; }

/* ── PLACEHOLDERS ── */
.ph { position: relative; width: 100%; height: 100%; background: var(--c-bg-card); overflow: hidden; }
.ph::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 14px, var(--c-ink-10) 14px, var(--c-ink-10) 15px); }
.ph-label { position: absolute; left: var(--s3); bottom: var(--s3); z-index: 1; font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--c-ink-45); background: var(--c-bg); padding: 2px 6px; border-radius: 1px; }

/* ── TWEAKS ── */
.tweaks-panel { position: fixed; bottom: var(--s6); right: var(--s6); z-index: 200; background: var(--c-bg); border: 1px solid var(--c-ink-20); border-radius: 3px; padding: var(--s4) var(--s6); min-width: 270px; box-shadow: 0 12px 48px rgba(0,0,0,.10); }
.tweaks-panel h5 { font-size: var(--f-xs); font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--c-ink-70); margin-bottom: var(--s4); }
.tw-row { display: flex; align-items: center; gap: var(--s3); margin-bottom: var(--s2); }
.tw-row label { font-size: var(--f-xs); color: var(--c-ink-70); flex: 0 0 110px; }
.tw-row input[type=range] { flex: 1; accent-color: var(--c-accent); }
.tw-val { font-size: var(--f-xs); color: var(--c-ink-45); font-family: monospace; min-width: 46px; text-align: right; }
.serif { font-family: 'Cormorant Garamond', serif; font-style: italic; }

/* ── RESPONSIVE ── */
@media (max-width: 960px) {
  .hero { grid-template-columns: 1fr; min-height: auto; padding-block: var(--s32); padding-top: calc(var(--s32) + 4rem); }
  .hero-portrait { align-items: flex-start; }
  .portrait-frame { max-width: 100%; aspect-ratio: 4 / 3; }
  .nav-links { display: none; }
  .editorial-grid { grid-template-columns: 1fr 1fr; gap: var(--s4); }
  .editorial-grid .card:nth-child(2), .editorial-grid .card:nth-child(3) { padding-top: 0; }
  .visit-inner { grid-template-columns: 1fr; gap: var(--s12); }
  .foot-inner { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  :root { --s8: 1.25rem; --s16: 3rem; --s24: 4.5rem; --s32: 6rem; --s48: 7rem; }
  .editorial-grid { grid-template-columns: 1fr; }
  .foot-inner { grid-template-columns: 1fr; }
  .tagline-band { padding-block: var(--s32); }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<!-- ── copy ── -->
<script type="text/babel">
/* global window */

function renderRich(arr) {
  if (typeof arr === "string") return arr;
  const out = [];
  arr.forEach((piece, i) => {
    if (typeof piece === "string") {
      const lines = piece.split("\n");
      lines.forEach((line, idx) => {
        out.push(line);
        if (idx < lines.length - 1) out.push(React.createElement("br", { key: "br-" + i + "-" + idx }));
      });
      return;
    }
    if (Array.isArray(piece)) {
      const tag = piece[0], text = piece[1];
      if (tag === "em")    { out.push(<em key={i}>{text}</em>); return; }
      if (tag === "serif") { out.push(<span key={i} className="serif">{text}</span>); return; }
    }
  });
  return out;
}

<script type="text/babel">
/* global window, React */
const { useEffect, useRef, useState } = React;

function smoothstep(lo, hi, x) {
  const t = Math.min(1, Math.max(0, (x - lo) / (hi - lo)));
  return t * t * (3 - 2 * t);
}

function GradientStage({ fill: raw }) {
  const washOut      = smoothstep(0.20, 0.52, raw);
  const washOpacity  = 1 - washOut * 0.94;
  const emptyIn      = smoothstep(0.36, 0.52, raw);
  const emptyOut     = smoothstep(0.58, 0.72, raw);
  const emptyOpacity = emptyIn * (1 - emptyOut);
  const fillOpacity  = smoothstep(0.58, 0.92, raw);
  const accentOpacity = smoothstep(0.70, 1.00, raw) * 0.55;
  const vignetteOpacity = smoothstep(0.65, 1.00, raw) * 0.12;

  return (
    <div className="gradient-stage" aria-hidden="true">
      <div className="g-wash"     style={{ opacity: washOpacity }} />
      <div className="g-fill"     style={{ opacity: fillOpacity }} />
      <div className="g-accent"   style={{ opacity: accentOpacity }} />
      <div className="g-vignette" style={{ opacity: vignetteOpacity }} />
      <div
        className={`gradient-empty-mark ${emptyOpacity > 0.01 ? "is-visible" : ""}`}
        style={{ opacity: emptyOpacity }}
      >
        <span className="em-ko">덜어내고</span>
        <span className="em-sep">·</span>
        <span className="em-en">less</span>
      </div>
    </div>
  );
}

function useScrollFill() {
  const [fill, setFill] = useState(0);
  const targetRef  = useRef(0);
  const currentRef = useRef(0);
  const rafRef     = useRef(0);
  useEffect(() => {
    const compute = () => {
      const max = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      targetRef.current = Math.min(1, Math.max(0, window.scrollY / max));
    };
    const tick = () => {
      const diff = targetRef.current - currentRef.current;
      if (Math.abs(diff) < 0.0004) { currentRef.current = targetRef.current; }
      else { currentRef.current += diff * 0.09; }
      setFill(currentRef.current);
      rafRef.current = requestAnimationFrame(tick);
    };
    compute();
    window.addEventListener("scroll", compute, { passive: true });
    window.addEventListener("resize", compute);
    rafRef.current = requestAnimationFrame(tick);
    return () => {
      window.removeEventListener("scroll", compute);
      window.removeEventListener("resize", compute);
      cancelAnimationFrame(rafRef.current);
    };
  }, []);
  return fill;
}

function ScrollProgress({ fill }) {
  return <div className="scroll-progress" style={{ width: `${fill * 100}%` }} />;
}

function Reveal({ children, delay = 0, as, className = "" }) {
  const Tag = as || "div";
  const ref = useRef(null);
  const [on, setOn] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(
      (entries) => { entries.forEach((e) => { if (e.isIntersecting) { setOn(true); io.disconnect(); } }); },
      { threshold: 0.15 }
    );
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  const dly = delay ? `d${delay}` : "";
  return (
    <Tag ref={ref} className={`reveal ${dly} ${on ? "in" : ""} ${className}`}>
      {children}
    </Tag>
  );
}

window.GradientStage = GradientStage;
window.useScrollFill = useScrollFill;
window.ScrollProgress = ScrollProgress;
window.Reveal = Reveal;
</script>

<script type="text/babel">
/* global window, React */
const { useEffect: _uE, useState: _uS } = React;
const TWEAK_DEFAULTS = { bodyWeight: 350, headingWeight: 300, tracking: -1 };

function applyTweaks(tw) {
  const r = document.documentElement;
  r.style.setProperty("--w-body", tw.bodyWeight);
  r.style.setProperty("--w-heading", tw.headingWeight);
  r.style.setProperty("--tracking", `${tw.tracking / 1000}em`);
}

function TweaksPanel() {
  const [visible, setVisible] = _uS(false);
  const [tweaks, setTweaks]   = _uS(TWEAK_DEFAULTS);
  _uE(() => applyTweaks(tweaks), [tweaks]);
  _uE(() => {
    const handler = (e) => {
      if (!e?.data) return;
      if (e.data.type === "__activate_edit_mode")   setVisible(true);
      if (e.data.type === "__deactivate_edit_mode") setVisible(false);
    };
    window.addEventListener("message", handler);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch(e) {}
    return () => window.removeEventListener("message", handler);
  }, []);
  const update = (k, v) => setTweaks(p => ({ ...p, [k]: v }));
  if (!visible) return null;
  return (
    <div className="tweaks-panel">
      <h5>Tweaks · Typography</h5>
      <div className="tw-row">
        <label>Body weight</label>
        <input type="range" min="100" max="600" step="50" value={tweaks.bodyWeight} onChange={e => update("bodyWeight", +e.target.value)} />
        <span className="tw-val">{tweaks.bodyWeight}</span>
      </div>
      <div className="tw-row">
        <label>Heading weight</label>
        <input type="range" min="100" max="600" step="50" value={tweaks.headingWeight} onChange={e => update("headingWeight", +e.target.value)} />
        <span className="tw-val">{tweaks.headingWeight}</span>
      </div>
      <div className="tw-row">
        <label>Letter-spacing</label>
        <input type="range" min="-40" max="20" step="1" value={tweaks.tracking} onChange={e => update("tracking", +e.target.value)} />
        <span className="tw-val">{(tweaks.tracking / 1000).toFixed(3)}em</span>
      </div>
    </div>
  );
}
window.TweaksPanel = TweaksPanel;
</script>
